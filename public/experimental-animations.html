<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knight Wolf — Experimental Animations</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Outfit:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrambleTextPlugin.min.js"></script>
  <style>
    :root {
      --bg: #050505;
      --sidebar-bg: #0a0a0f;
      --text: #ffffff;
      --accent: #ffffff;
      --muted: #444444;
      --border: rgba(255, 255, 255, 0.05);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: 320px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 10;
    }

    .sidebar-header {
      padding: 40px 30px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.1rem;
      letter-spacing: 0.05em;
    }

    .demo-list {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
    }

    .demo-item {
      padding: 20px 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      border-left: 2px solid transparent;
    }

    .demo-item:hover { background: rgba(255, 255, 255, 0.02); }
    .demo-item.active { background: rgba(255, 255, 255, 0.04); border-left-color: #fff; }

    .demo-item .name {
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      font-weight: 700;
      color: #fff;
      display: block;
      margin-bottom: 4px;
    }

    .demo-item .desc {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ─── PREVIEW AREA ─── */
    .preview {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .preview-content {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: #fff;
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      margin-bottom: 20px;
      opacity: 0;
    }

    .brand-container {
      position: relative;
      overflow: visible;
    }

    .brand-name {
      font-family: 'Libre Baskerville', serif;
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      white-space: nowrap;
      display: flex;
    }

    .letter {
      display: inline-block;
      position: relative;
      opacity: 0;
    }

    /* Chromatic Aberration Layers */
    .letter::before, .letter::after {
      content: attr(data-char);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
    }

    .letter::before { color: #ff00ff; z-index: -1; }
    .letter::after { color: #00ffff; z-index: -2; }

    .btn-replay {
      position: absolute;
      bottom: 40px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 10px 20px;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-replay:hover { color: #fff; border-color: #fff; }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-header">
      <h1>EXPERIMENTAL</h1>
      <p>Next-Gen Typography</p>
    </div>
    <div class="demo-list" id="demoList">
      <!-- Injected via JS -->
    </div>
  </div>

  <div class="preview">
    <div class="preview-content">
      <div class="logo" id="logo"></div>
      <div class="brand-container">
        <div class="brand-name" id="brandName"></div>
      </div>
    </div>
    <button class="btn-replay" onclick="playCurrent()">↺ Replay Animation</button>
  </div>

  <script>
    const brandText = "KNIGHTWOLF";
    const brandContainer = document.getElementById('brandName');
    const logo = document.getElementById('logo');

    const animations = [
      { id: 'decipher', name: 'The Decipher Strike', desc: 'Code-scramble + chromatic hit' },
      { id: 'maskedSlide', name: 'Masked Stagger', desc: 'Vertical reveal through clip-path' },
      { id: 'perspective3d', name: 'Perspective Warp', desc: 'Deep-space Z-axis entrance' },
      { id: 'glitchVHS', name: 'VHS Glitch', desc: 'Signal interference + scanlines' },
      { id: 'liquidReveal', name: 'Liquid Flow', desc: 'Organic wave-like apparition' }
    ];

    let currentAnimId = 'decipher';

    // Init UI
    animations.forEach(anim => {
      const item = document.createElement('div');
      item.className = `demo-item ${anim.id === currentAnimId ? 'active' : ''}`;
      item.innerHTML = `<span class="name">${anim.name}</span><span class="desc">${anim.desc}</span>`;
      item.onclick = () => {
        currentAnimId = anim.id;
        document.querySelectorAll('.demo-item').forEach(el => el.classList.remove('active'));
        item.classList.add('active');
        playCurrent();
      };
      document.getElementById('demoList').appendChild(item);
    });

    // Init letters
    function initLetters() {
      brandContainer.innerHTML = '';
      brandText.split('').forEach(char => {
        const span = document.createElement('span');
        span.className = 'letter';
        span.textContent = char;
        span.setAttribute('data-char', char);
        brandContainer.appendChild(span);
      });
    }

    function playCurrent() {
      initLetters();
      const letters = document.querySelectorAll('.letter');
      gsap.killTweensOf([logo, letters, '.letter::before', '.letter::after']);
      gsap.set([logo, letters], { opacity: 0 });

      const tl = gsap.timeline();

      if (currentAnimId === 'decipher') {
        tl.to(logo, { opacity: 1, scale: 1.2, duration: 0.4, ease: 'back.out' });
        tl.fromTo(letters, 
          { opacity: 0, y: 20, skewX: 20 },
          { 
            opacity: 1, y: 0, skewX: 0, 
            duration: 0.6, 
            stagger: 0.05, 
            ease: 'expo.out',
            onStart: function() {
              // Custom scramble effect
              const target = this.targets()[0];
              const original = target.textContent;
              const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
              let iterations = 0;
              const interval = setInterval(() => {
                target.textContent = original.split('').map(() => chars[Math.floor(Math.random() * chars.length)]).join('');
                if (iterations++ > 10) {
                  clearInterval(interval);
                  target.textContent = original;
                }
              }, 30);
            }
          }
        );
        // Chromatic Hit
        tl.to(letters, {
          x: (i) => i % 2 === 0 ? 2 : -2,
          duration: 0.1,
          repeat: 3,
          yoyo: true,
          ease: 'none'
        }, "-=0.3");
      }

      if (currentAnimId === 'maskedSlide') {
        gsap.set(brandContainer, { overflow: 'hidden' });
        tl.to(logo, { opacity: 1, y: 0, duration: 0.8, ease: 'power4.out' });
        tl.fromTo(letters,
          { y: '100%', opacity: 1 },
          { y: '0%', duration: 1.2, stagger: 0.08, ease: 'expo.inOut' },
          0.2
        );
      }

      if (currentAnimId === 'perspective3d') {
        tl.to(logo, { opacity: 1, z: 0, duration: 1, ease: 'power2.out' });
        tl.fromTo(letters,
          { opacity: 0, z: -500, rotationX: 90, filter: 'blur(20px)' },
          { opacity: 1, z: 0, rotationX: 0, filter: 'blur(0px)', duration: 1.5, stagger: 0.1, ease: 'power3.out' },
          0.1
        );
      }

      if (currentAnimId === 'glitchVHS') {
        tl.to(logo, { opacity: 1, duration: 0.1 });
        tl.fromTo(letters,
          { opacity: 0, x: 10 },
          { 
            opacity: 1, x: 0, 
            duration: 0.8, 
            stagger: 0.02, 
            ease: 'rough({ strength: 2, points: 20 })' 
          }
        );
        // Jitter loop
        tl.to(letters, {
          x: () => Math.random() * 4 - 2,
          y: () => Math.random() * 2 - 1,
          duration: 0.1,
          repeat: 5,
          yoyo: true
        });
      }

      if (currentAnimId === 'liquidReveal') {
        tl.to(logo, { opacity: 1, scale: 1.5, duration: 1.5, ease: 'sine.inOut' });
        tl.fromTo(letters,
          { opacity: 0, scale: 0, filter: 'blur(10px)' },
          { 
            opacity: 1, scale: 1, filter: 'blur(0px)', 
            duration: 1.5, 
            stagger: { each: 0.1, from: 'center' }, 
            ease: 'elastic.out(1, 0.3)' 
          },
          0.3
        );
      }
    }

    playCurrent();
  </script>
</body>
</html>
