<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knight Wolf — Advanced Blur Fade Types</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Outfit:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    :root {
      --bg: #050505;
      --sidebar-bg: #0a0a0f;
      --text: #ffffff;
      --accent: #ffffff;
      --muted: #666666;
      --border: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: 320px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 10;
    }

    .sidebar-header {
      padding: 40px 30px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.2rem;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }

    .sidebar-header p {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }

    .demo-list {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
    }

    .demo-item {
      padding: 18px 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      border-left: 3px solid transparent;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .demo-item:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .demo-item.active {
      background: rgba(255, 255, 255, 0.05);
      border-left-color: var(--accent);
    }

    .demo-item .name {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      color: #fff;
    }

    .demo-item .desc {
      font-size: 0.7rem;
      color: var(--muted);
    }

    /* ─── PREVIEW AREA ─── */
    .preview {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      background-image: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.02) 0%, transparent 70%);
    }

    .preview-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* Logo Styling */
    .logo-svg {
      width: 140px;
      height: auto;
      margin-bottom: 20px;
      opacity: 0;
      transform: scale(1.1);
    }

    /* Brand Name Styling */
    .brand-name {
      font-family: 'Libre Baskerville', serif;
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      display: flex;
      position: relative;
    }

    .letter {
      display: inline-block;
      opacity: 0;
      will-change: filter, transform, opacity;
    }

    /* Controls Overlay */
    .controls {
      position: absolute;
      bottom: 40px;
      display: flex;
      gap: 20px;
    }

    .btn {
      background: transparent;
      border: 1px solid var(--border);
      color: #fff;
      padding: 12px 24px;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 2px;
    }

    .btn:hover {
      background: #fff;
      color: #000;
    }

    /* Notification */
    .hint {
      position: absolute;
      top: 40px;
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-header">
      <h1>BLUR TYPES</h1>
      <p>Advanced Variations</p>
    </div>
    <div class="demo-list" id="demoList">
      <!-- Injected via JS -->
    </div>
  </div>

  <div class="preview">
    <div class="hint">Splash Screen Preview</div>
    
    <div class="preview-container">
      <!-- Simple Wolf Logo Placeholder -->
      <svg class="logo-svg" id="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path fill="white" d="M50 10 L85 40 L70 90 L30 90 L15 40 Z M40 45 L60 45 L50 65 Z" />
      </svg>

      <div class="brand-name" id="brandName"></div>
    </div>

    <div class="controls">
      <button class="btn" onclick="playCurrent()">↺ Replay Animation</button>
    </div>
  </div>

  <script>
    const brandText = "KNIGHTWOLF";
    const demos = [
      { id: 'prismBlur', name: 'Prism Blur', desc: 'Hue-shift + 60px Gaussian Blur', config: { filter: 'blur(60px) hue-rotate(90deg)', scale: 1.2, ease: 'power2.out', duration: 1.8, stagger: 0.05 } },
      { id: 'radiantBloom', name: 'Radiant Bloom', desc: 'Max brightness + intense bloom', config: { filter: 'blur(80px) brightness(10)', scale: 0.5, ease: 'expo.out', duration: 2, stagger: 0.04 } },
      { id: 'smearBlur', name: 'Directional Smear', desc: 'Vertical stretch + motion blur', config: { filter: 'blur(40px)', y: -100, scaleY: 3, ease: 'power4.out', duration: 1.2, stagger: 0.03 } },
      { id: 'inkBleed', name: 'Ink Bleed', desc: 'Saturation spread + smooth blur', config: { filter: 'blur(30px) saturate(0)', scale: 1.1, ease: 'sine.inOut', duration: 2.5, stagger: 0.1 } },
      { id: 'sandBlur', name: 'Grainy Sand', desc: 'High contrast + low-radius blur', config: { filter: 'blur(5px) contrast(200%)', y: 10, scale: 0.95, ease: 'power1.out', duration: 1.2, stagger: 0.02 } },
      { id: 'ghostlyEcho', name: 'Ghostly Echo', desc: 'Rotation + offset blur layers', config: { filter: 'blur(50px)', x: -20, rotationY: 45, ease: 'power2.inOut', duration: 1.5, stagger: 0.06 } },
      { id: 'horizonWipe', name: 'Horizon Wipe', desc: 'Extreme tracking + blur dissolve', config: { filter: 'blur(20px)', letterSpacing: '2em', ease: 'expo.out', duration: 1.2, stagger: 0.05 } },
      { id: 'frostedSnap', name: 'Frosted Snap', desc: 'Ultra-quick 120px sharpen', config: { filter: 'blur(120px)', scale: 2, ease: 'power4.inOut', duration: 0.7, stagger: 0.02 } }
    ];

    let currentDemoId = 'prismBlur';
    const demoList = document.getElementById('demoList');
    const brandContainer = document.getElementById('brandName');
    const logo = document.getElementById('logo');

    // Init letters
    brandText.split('').forEach(char => {
      const span = document.createElement('span');
      span.className = 'letter';
      span.textContent = char;
      brandContainer.appendChild(span);
    });

    const letters = document.querySelectorAll('.letter');

    // Render list
    demos.forEach(demo => {
      const item = document.createElement('div');
      item.className = `demo-item ${demo.id === currentDemoId ? 'active' : ''}`;
      item.innerHTML = `
        <div class="name">${demo.name}</div>
        <div class="desc">${demo.desc}</div>
      `;
      item.onclick = () => selectDemo(demo.id);
      demoList.appendChild(item);
    });

    function selectDemo(id) {
      currentDemoId = id;
      document.querySelectorAll('.demo-item').forEach(el => el.classList.remove('active'));
      
      Array.from(document.querySelectorAll('.demo-item')).forEach(item => {
        if (item.querySelector('.name').textContent === demos.find(d => d.id === id).name) {
          item.classList.add('active');
        }
      });

      playCurrent();
    }

    function playCurrent() {
      const demo = demos.find(d => d.id === currentDemoId);
      
      // Reset
      gsap.killTweensOf([logo, letters]);
      gsap.set(logo, { opacity: 0, scale: 1.1 });
      gsap.set(letters, { opacity: 0, filter: 'blur(0px)', scale: 1, x: 0, y: 0, rotation: 0, rotationY: 0, scaleY: 1, letterSpacing: '0.2em', brightness: 1, contrast: 1, saturate: 1 });

      const tl = gsap.timeline();

      // Logo Entrance
      tl.to(logo, { opacity: 1, scale: 1, duration: 0.8, ease: 'expo.out' });

      // Text Reveal
      const config = demo.config;
      
      tl.fromTo(letters, 
        { 
          opacity: 0, 
          filter: config.filter, 
          scale: config.scale !== undefined ? config.scale : 1,
          scaleY: config.scaleY || 1,
          x: config.x || 0,
          y: config.y || 0,
          rotationY: config.rotationY || 0,
          letterSpacing: config.letterSpacing || '0.2em'
        },
        { 
          opacity: 1, 
          filter: 'blur(0px)', 
          scale: 1,
          scaleY: 1,
          x: 0,
          y: 0,
          rotationY: 0,
          letterSpacing: '0.2em',
          duration: config.duration, 
          ease: config.ease, 
          stagger: config.stagger 
        },
        0.3
      );
    }

    // Initial play
    playCurrent();
  </script>
</body>
</html>
